version = 0.1

[default]
[default.global.parameters]
stack_name = "accessibility-ai-serverless"

[default.build.parameters]
cached = true
parallel = true

[default.validate.parameters]
lint = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true
region = "us-east-1"
parameter_overrides = "Environment=dev BudgetLimit=100 TranscribeRegion=us-east-1"

[default.package.parameters]
resolve_s3 = true

[default.sync.parameters]
watch = true

[default.local_start_api.parameters]
warm_containers = "EAGER"

[default.local_start_lambda.parameters]
warm_containers = "EAGER"

[staging]
[staging.deploy.parameters]
stack_name = "accessibility-ai-serverless-staging"
region = "us-east-1"
parameter_overrides = "Environment=staging BudgetLimit=100 TranscribeRegion=us-east-1"
confirm_changeset = false

[prod]
[prod.deploy.parameters]
stack_name = "accessibility-ai-serverless-prod"
region = "us-east-1"
parameter_overrides = "Environment=prod BudgetLimit=100 TranscribeRegion=us-east-1"
confirm_changeset = true
fail_on_empty_changeset = false
