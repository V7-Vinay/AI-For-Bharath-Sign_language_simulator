AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Accessibility AI Serverless System - Cost-optimized serverless infrastructure

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name

  BudgetLimit:
    Type: Number
    Default: 100
    Description: Monthly budget limit in USD

  TranscribeRegion:
    Type: String
    Default: us-east-1
    Description: AWS region for Transcribe service

Globals:
  Function:
    Runtime: nodejs18.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        BUDGET_LIMIT: !Ref BudgetLimit
        CACHE_TABLE: !Ref CacheTable
        USER_PREFERENCES_TABLE: !Ref UserPreferencesTable
        COST_TRACKING_TABLE: !Ref CostTrackingTable
        MODEL_BUCKET: !Ref ModelStorageBucket
        TRANSCRIBE_REGION: !Ref TranscribeRegion

Resources:
  # DynamoDB Tables
  UserPreferencesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${Environment}-accessibility-user-preferences"
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: accessibility-ai-serverless

  CacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${Environment}-accessibility-cache"
      BillingMode: ON_DEMAND
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: accessibility-ai-serverless

  CostTrackingTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${Environment}-accessibility-cost-tracking"
      BillingMode: ON_DEMAND
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: accessibility-ai-serverless

  # S3 Bucket for Models and Assets
  ModelStorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${Environment}-accessibility-models-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ArchiveOldModelVersions
            Status: Enabled
            NoncurrentVersionTransitions:
              - TransitionInDays: 90
                StorageClass: GLACIER
          - Id: DeleteIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: accessibility-ai-serverless

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        PriceClass: PriceClass_100
        Comment: !Sub "Accessibility AI CDN - ${Environment}"
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt ModelStorageBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub "origin-access-identity/cloudfront/${CloudFrontOriginAccessIdentity}"
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          MinTTL: 0
          DefaultTTL: 2592000
          MaxTTL: 2592000
        CacheBehaviors:
          - PathPattern: "/avatars/*"
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
            Compress: true
            ForwardedValues:
              QueryString: false
            MinTTL: 2592000
            DefaultTTL: 2592000
            MaxTTL: 2592000
          - PathPattern: "/models/*"
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
            Compress: true
            ForwardedValues:
              QueryString: false
            MinTTL: 2592000
            DefaultTTL: 2592000
            MaxTTL: 2592000
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 300

  CloudFrontOriginAccessIdentity:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub "OAI for ${Environment} accessibility models bucket"

  ModelStorageBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ModelStorageBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontAccess
            Effect: Allow
            Principal:
              CanonicalUser: !GetAtt CloudFrontOriginAccessIdentity.S3CanonicalUserId
            Action: "s3:GetObject"
            Resource: !Sub "${ModelStorageBucket.Arn}/*"

  # API Gateway REST API
  RestApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "${Environment}-accessibility-rest-api"
      StageName: !Ref Environment
      Auth:
        ApiKeyRequired: true
        UsagePlan:
          CreateUsagePlan: PER_API
          UsagePlanName: !Sub "${Environment}-accessibility-usage-plan"
          Quota:
            Limit: 100000
            Period: MONTH
          Throttle:
            RateLimit: 100
            BurstLimit: 200
      Cors:
        AllowMethods: "'GET,POST,PUT,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
        AllowOrigin: "'*'"
      Tags:
        Environment: !Ref Environment
        Application: accessibility-ai-serverless

  # API Gateway WebSocket API
  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${Environment}-accessibility-websocket-api"
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"
      Tags:
        Environment: !Ref Environment
        Application: accessibility-ai-serverless

  WebSocketApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      StageName: !Ref Environment
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingRateLimit: 100
        ThrottlingBurstLimit: 200

  # Lambda Functions
  TranscriptionServiceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-transcription-service"
      CodeUri: ../lambda/transcription-service/
      Handler: index.handler
      MemorySize: 1024
      Timeout: 30
      Environment:
        Variables:
          SUPPORTED_LANGUAGES: "en,es,fr,de,zh"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CacheTable
        - Statement:
            - Effect: Allow
              Action:
                - transcribe:StartStreamTranscription
                - transcribe:StartTranscriptionJob
                - transcribe:GetTranscriptionJob
              Resource: "*"
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: "*"
      Events:
        WebSocketConnect:
          Type: Api
          Properties:
            Path: /$connect
            Method: POST
            RestApiId: !Ref WebSocketApi
        WebSocketTranscribe:
          Type: Api
          Properties:
            Path: /transcribe
            Method: POST
            RestApiId: !Ref WebSocketApi

  SignLanguageTranslatorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-sign-language-translator"
      CodeUri: ../lambda/sign-language-translator/
      Handler: index.handler
      MemorySize: 512
      Timeout: 10
      Environment:
        Variables:
          SUPPORTED_SIGN_LANGUAGES: "ASL,BSL"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CacheTable
        - S3ReadPolicy:
            BucketName: !Ref ModelStorageBucket
        - Statement:
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: "*"
      Events:
        TranslateApi:
          Type: Api
          Properties:
            Path: /translate
            Method: POST
            RestApiId: !Ref RestApi

  CostMonitorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-cost-monitor"
      CodeUri: ../lambda/cost-monitor/
      Handler: index.handler
      MemorySize: 256
      Timeout: 5
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CostTrackingTable
        - Statement:
            - Effect: Allow
              Action:
                - cloudwatch:GetMetricStatistics
                - cloudwatch:PutMetricData
                - ce:GetCostAndUsage
                - pricing:GetProducts
              Resource: "*"
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: !Ref CostAlertTopic
            - Effect: Allow
              Action:
                - apigateway:UpdateUsagePlan
              Resource: "*"
      Events:
        HourlySchedule:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)
            Enabled: true

  CacheManagerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-cache-manager"
      CodeUri: ../lambda/cache-manager/
      Handler: index.handler
      MemorySize: 256
      Timeout: 5
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CacheTable
        - Statement:
            - Effect: Allow
              Action:
                - cloudfront:CreateInvalidation
              Resource: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"
      Events:
        HourlyCleanup:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)
            Enabled: true

  PreferencesHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-preferences-handler"
      CodeUri: ../lambda/preferences-handler/
      Handler: index.handler
      MemorySize: 256
      Timeout: 5
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UserPreferencesTable
        - Statement:
            - Effect: Allow
              Action:
                - kms:Decrypt
                - kms:Encrypt
              Resource: !GetAtt UserPreferencesKMSKey.Arn
      Events:
        GetPreferences:
          Type: Api
          Properties:
            Path: /preferences
            Method: GET
            RestApiId: !Ref RestApi
        UpdatePreferences:
          Type: Api
          Properties:
            Path: /preferences
            Method: PUT
            RestApiId: !Ref RestApi

  HealthCheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-health-check"
      CodeUri: ../lambda/health-check/
      Handler: index.handler
      MemorySize: 128
      Timeout: 3
      Events:
        HealthApi:
          Type: Api
          Properties:
            Path: /health
            Method: GET
            RestApiId: !Ref RestApi

  # SNS Topic for Alerts
  CostAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${Environment}-accessibility-cost-alerts"
      DisplayName: Accessibility AI Cost Alerts
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # KMS Key for User Preferences Encryption
  UserPreferencesKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for encrypting user preferences
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
          - Sid: Allow Lambda to use the key
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - "kms:Decrypt"
              - "kms:Encrypt"
            Resource: "*"

  UserPreferencesKMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${Environment}-accessibility-user-prefs"
      TargetKeyId: !Ref UserPreferencesKMSKey

Outputs:
  RestApiUrl:
    Description: REST API Gateway endpoint URL
    Value: !Sub "https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
    Export:
      Name: !Sub "${Environment}-RestApiUrl"

  WebSocketApiUrl:
    Description: WebSocket API Gateway endpoint URL
    Value: !Sub "wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
    Export:
      Name: !Sub "${Environment}-WebSocketApiUrl"

  CloudFrontDomain:
    Description: CloudFront distribution domain name
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub "${Environment}-CloudFrontDomain"

  ModelStorageBucketName:
    Description: S3 bucket name for models and assets
    Value: !Ref ModelStorageBucket
    Export:
      Name: !Sub "${Environment}-ModelStorageBucket"

  CostAlertTopicArn:
    Description: SNS topic ARN for cost alerts
    Value: !Ref CostAlertTopic
    Export:
      Name: !Sub "${Environment}-CostAlertTopicArn"
